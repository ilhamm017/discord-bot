services:
  yova:
    build: .
    container_name: yova-bot
    restart: unless-stopped
    user: "1000:1000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      LOG_TO_FILE: "true"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./logs:/app/logs
      - ./.data:/app/.data
