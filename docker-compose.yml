services:
  yova:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yova
    init: true
    restart: unless-stopped
    working_dir: /app
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      CONFIG_WEB_HOST: 0.0.0.0
      CONFIG_WEB_PORT: 3210
      CONFIG_WEB_TOKEN: ${CONFIG_WEB_TOKEN:-}
      CONFIG_BACKUP_DIR: /app/.data/config-backups
      LAVALINK_CONFIG_BACKUP_DIR: /app/.data/lavalink-config-backups
      AUDIO_CACHE_HOST: 127.0.0.1
      AUDIO_CACHE_PORT: 3211
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YTDLP_COOKIES_PATH: ${YTDLP_COOKIES_PATH:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3210:3210"
    volumes:
      - ./config.json:/app/config.json
      - ./database.sqlite:/app/database.sqlite
      - ./.data:/app/.data
      - ./logs:/app/logs
      - ./lavalink/application.yml:/app/lavalink/application.yml
      - ./lavalink/logs:/app/lavalink/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3210/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    stop_grace_period: 30s
