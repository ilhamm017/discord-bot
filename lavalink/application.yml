server: # server settings
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      mixer: false
      http: true
      local: true
    bufferDurationMs: 1200 # Larger jitter buffer to reduce audible stutter on unstable links
    frameBufferDurationMs: 8000 # Keep more decoded frames to absorb short network/CPU hiccups
    opusEncodingQuality: 10 # Higher Opus encoder quality for cleaner output
    resamplingQuality: HIGH # Higher resampling quality for better fidelity
    trackStuckThresholdMs: 30000 # Avoid premature "stuck" stop on transient jitter spikes
    useSeekGhosting: true # Seek ghosting is a technique to prevent audio artifacts when seeking by applying a small crossfade.
    youtubePlaylistLoadLimit: 6 # Number of pages at 100 per page
    playerUpdateInterval: 5 # Reduce update chatter between Lavalink and bot for steadier playback
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
    #ratelimit:
      #ipBlocks: ["1.0.0.0/8", "..."] # list of ip blocks
      #excludedIps: ["1.1.1.1"] # ips which should be explicit excluded from usage by lavalink
      #strategy: "RotateOnBan" # RotateOnBan | LoadBalance | NanoIp | RotatingNanoIp
      #searchTriggersFail: true # Whether a search 429 should trigger marking the IP as banned
      #retryLimit: -1 # -1 = use default lavalink value | 0 = no retry | >0 = retry limit

youtube:
  enabled: true
  clients:
    - MUSIC
    - WEB
    - TVHTML5_SIMPLY_EMBEDDED_PLAYER

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

logging:
  file:
    path: ./logs/lavalink.log
  level:
    root: INFO
    lavalink: INFO

  request:
    enabled: false
    includeClientInfo: true
    includeHeaders: false
    includePayload: false
    includeQueryString: false
